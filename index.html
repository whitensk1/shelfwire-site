<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="p:domain_verify" content="ba3eca7c7f9a211c7e49f928717fe940"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Worklab</title>
  <meta name="description" content="Worklab — creative work lab. Generated films & stills, synced from Pinterest." />
  <meta name="author" content="Worklab" />
  <meta property="og:site_name" content="Worklab" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/gallery.css" />
</head>
<body>
  <nav class="nav" aria-label="Primary">
    <div class="nav-inner">
      <a class="brand" href="index.html" id="brand-name">Worklab</a>
      <div class="nav-links">
        <a href="#gallery">Lab</a>
        <a href="privacy.html">Privacy</a>
        <a class="nav-cta" href="mailto:nicedudin@gmail.com">Contact</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <video class="hero-video" id="hero-video" muted loop playsinline autoplay preload="metadata"></video>
    <div class="hero-veil"></div>
    <div class="hero-copy">
      <p class="hero-kicker">Creative work lab</p>
      <h1 id="hero-title">Work in motion.
All in one lab.</h1>
      <p class="hero-sub" id="hero-sub">Generated work, synced from Pinterest.</p>
      <div class="hero-actions">
        <a class="btn btn-fill" href="#gallery">Enter the lab</a>
        <a class="btn btn-ghost" href="https://www.pinterest.com/whtsib/" target="_blank" rel="noopener">Pinterest</a>
      </div>
      <p class="hero-sub" id="sync-meta" style="margin-top:18px;font-size:13px;opacity:0.75"></p>
    </div>
  </header>

  <section class="strip" id="gallery">
    <div class="strip-inner">
      <div class="strip-label">Boards · auto-synced</div>
      <div class="tabs" id="tabs" role="tablist"></div>
    </div>
  </section>

  <section class="stage" id="stage">
    <div class="stage-head" id="stage-head"></div>
    <div class="grid" id="grid"></div>
  </section>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="sheet">
      <button type="button" class="x" id="sheet-close" aria-label="Close">×</button>
      <div class="sheet-media">
        <video id="sheet-video" controls playsinline></video>
      </div>
      <div class="sheet-body">
        <div class="eyebrow" id="sheet-cat"></div>
        <h2 id="sheet-title"></h2>
        <p id="sheet-blurb"></p>
        <div class="sheet-actions">
          <a class="btn btn-fill" id="sheet-link" href="#" target="_blank" rel="noopener">Product link →</a>
          <a class="btn btn-ghost" id="sheet-site" href="https://horbi.org/" target="_blank" rel="noopener" hidden>Official site →</a>
          <a class="btn btn-ghost" id="sheet-pin" href="#" target="_blank" rel="noopener">Pinterest</a>
          <button type="button" class="btn btn-ghost" id="sheet-copy" title="Copy share link to this work">Copy link</button>
          <button type="button" class="btn btn-ghost" id="sheet-close-2">Close</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="foot">
    <div class="foot-inner">
      <div>Worklab · worklab.page</div>
      <div>
        <a href="privacy.html">Privacy</a>
        ·
        <a href="mailto:nicedudin@gmail.com">nicedudin@gmail.com</a>
        ·
        <a href="https://www.pinterest.com/whtsib/" target="_blank" rel="noopener">@whtsib</a>
      </div>
    </div>
  </footer>

  <script src="js/catalog.js"></script>
  <script src="js/gallery.js?v=2"></script>
</body>
</html>
